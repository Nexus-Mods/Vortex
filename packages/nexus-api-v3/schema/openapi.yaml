        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateModFileVersionRequest"
      responses:
        "201":
          description: The created mod file version.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    "$ref": "#/components/schemas/CreateModFileVersionSuccess"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: Unprocessable Content
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/mod-file-versions/{id}":
    get:
      tags:
        - mods
      summary: Get mod file version
      description: "Retrieve a single mod file version by its identifier.

        "
      operationId: getModFileVersion
      x-badges:
        - name: Experimental
          color: orange
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier for the mod file version.
          schema:
            type: string
      responses:
        "200":
          description: The mod file version.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    "$ref": "#/components/schemas/ModFileVersion"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: The mod file version was not found.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/mod-file-versions/move":
    post:
      tags:
        - mods
      summary: Move multiple mod file versions
      description: |
        Moves one or more mod file versions to a new position relative to
        another version, which may be in a different mod file.

        Versions are inserted in the order given by `version_ids`.
        `version_ids` is expected to be ordered from earliest to latest version.

        **Example:** Given a mod file with versions `[v1.0.0, v1.1.0, v2.0.0]`
        (earliest to latest), moving `[v1.0.1, v1.0.2]` with `relative_placement: "after"`
        targeting `v1.0.0` produces `[v1.0.0, v1.0.1, v1.0.2, v1.1.0, v2.0.0]`.
      operationId: moveModFileVersions
      x-badges:
        - name: Experimental
          color: orange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/MoveModFileVersionsRequest"
      responses:
        "200":
          description: The versions were moved successfully.
          content:
            application/json:
              schema:
