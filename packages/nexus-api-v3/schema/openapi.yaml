  "/uploads/multipart":
    post:
      tags:
        - uploads
      summary: Create multipart upload
      description: "Creates a new multipart upload session. This allows you to upload
        data for a new mod file.\n\n\U0001F4A1 Files smaller than 100 MiB can use
        the simpler [single part upload](#tag/uploads/operation/createUpload).\n\n###
        Next steps\nMultipart upload uses the [Amazon S3 multipart upload specification](https://docs.aws.amazon.com/AmazonS3/latest/userguide/mpuoverview.html).\n\n*
        Call `PUT` with your file data to each `part_presigned_urls`.\n   * Each part
        must be `part_size_bytes` bytes, apart from the final part which may be smaller.\n
        \  * Retrieve the `ETag` response header value from each part upload.\n* Once
        all parts are uploaded, call `POST` to the `complete presigned_url` with [XML
        post data](#multipart-resources) describing\n  the `ETag` for each part.\n*
        Once multipart complete is called, [finalise the upload](#tag/uploads/operation/finaliseUpload).\n\n###
        Multipart resources\n\nSample XML for completing the multipart upload:\n\n```xml\n<CompleteMultipartUpload>
        \                                                                                                                                                                                                         \n
        \ <Part>                                                                                                                                                                                                                                                                           \n
        \   <PartNumber>1</PartNumber>                                                                                                                                                                                                                                                     \n
        \   <ETag>a54357aff0632cce46d942af68356b38</ETag>                                                                                                                                                                                                                                \n
        \ </Part>                                                                                                                                                                                                                                                                          \n
        \ <Part>                                                                                                                                                                                                                                                                           \n
        \   <PartNumber>2</PartNumber>                                                                                                                                                                                                                                                     \n
        \   <ETag>0c78aef83f66abc1fa1e8477f296d394</ETag>                                                                                                                                                                                                                                \n
        \ </Part>                                                                                                                                                                                                                                                                          \n
        \ <Part>                                                                                                                                                                                                                                                                           \n
        \   <PartNumber>3</PartNumber>                                                                                                                                                                                                                                                     \n
        \   <ETag>acbd18db4cc2f85cedef654fccc4a4d8</ETag>                                                                                                                                                                                                                                \n
        \ </Part>                                                                                                                                                                                                                                                                          \n</CompleteMultipartUpload>\n```\n"
      operationId: createMultipartUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateUploadRequest"
      responses:
        "201":
          description: Upload ID and presigned URL
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    "$ref": "#/components/schemas/CreateMultipartUploadSuccess"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: Unprocessable Content
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/uploads/{id}/finalise":
    post:
      tags:
