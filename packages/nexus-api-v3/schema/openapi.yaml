        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: The mod file was not found.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
    post:
      tags:
        - mod-files
      x-badges:
        - name: Experimental
          color: orange
      summary: Create a new mod file version
      description: |
        Creates a new version of an existing mod file. The upload specified in the request becomes
