    CreateModFileVersionSuccess:
      type: object
      required:
        - file
        - version
      properties:
        file:
          "$ref": "#/components/schemas/UploadModFile"
        version:
          "$ref": "#/components/schemas/CreatedModFileVersion"
    CreatedModFileVersion:
      type: object
      required:
        - id
        - position
      properties:
        id:
          type: string
          description: The unique identifier for the created mod file version.
        position:
          type: string
          format: decimal
