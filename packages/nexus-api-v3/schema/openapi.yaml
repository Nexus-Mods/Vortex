      summary: Finalise upload
      description: |
        Closes the upload session once all data is uploaded. Sessions must be closed before you can use the upload as a mod file.
        ### Next steps
        * Wait for the upload to be ready for use as a mod file. Use [get upload](#tag/uploads/operation/getUpload) to check that `state`
          is `available`.
        * [Create a mod file](#tag/mod-files/operation/createModFile) from this upload.
      operationId: finaliseUpload
      parameters:
        - name: id
