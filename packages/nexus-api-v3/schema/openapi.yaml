---
openapi: 3.0.3
info:
  title: Nexus Mods API
  version: 3.0.0
  description: "## Overview\nBuild tools and integrations for the Nexus Mods platform
    using our API.\n\n* Access mod data, user information, and platform features to
    power your own applications, services, and workflows.\n* Use our OpenAPI specification
    to explore and integrate the API.\n\n### I want to\n#### upload a mod\n* **Using
    GitHub to manage your mod workflow?** Try our [GitHub action](https://github.com/marketplace/actions/upload-to-nexus-mods)\n
    \ and [sample workflow](https://github.com/Nexus-Mods/API-Example)!\n* Or get
    started at [creating a new upload session](#tag/uploads/operation/createUpload).\n\n###
    Legacy APIs    \nLegacy integrations may still be using our [v1 API](https://app.swaggerhub.com/apis-docs/NexusMods/nexus-mods_public_api_params_in_form_data/1.0#/).\n\n###
    API Stability\n\nEndpoints are marked with badges indicating their stability level:\n\n|
    Badge | Meaning |\n| ----- | ------- |\n| *(none)* | **Stable** - Production ready.
    No breaking changes. |\n| Beta | Feature complete but may have minor changes before
    stabilisation. |\n| Experimental | May change significantly or be removed. Not
    recommended for production. |\n\nStable endpoints may receive additive enhancements
    (new optional fields/parameters)\nthat won't break existing integrations.\n\n###
    Deprecation Policy\n\n**Stable endpoints:** If a field or endpoint needs to change,
    it will be marked as\n`deprecated` with a minimum **90-day deprecation period**
    and migration guidance.\n\n**Beta endpoints:** Changes will be marked as `deprecated`
    with a minimum **10-day\ndeprecation period** and migration guidance.\n\nDeprecated
    fields continue to function during the deprecation period.\n"
  contact:
    name: Nexus Mods
    url: https://nexusmods.com
  x-logo:
    url: https://api-docs.nexusmods.com/logo-light.png
    altText: Nexus Mods
tags:
  - name: collections
    description: Collection management
  - name: mod-files
    description: Mod file management
  - name: mods
    description: Mod management
  - name: uploads
    description: Upload management
servers:
  - url: https://api.nexusmods.com/v3
    description: Production server
security:
  - ApiKeyAuth: []
  - BearerJwtAuth: []
