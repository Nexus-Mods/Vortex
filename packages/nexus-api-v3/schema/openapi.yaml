components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
      description: Get your personal API key from https://www.nexusmods.com/settings/api-keys
    BearerJwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "A signed JWT sent as `Authorization: Bearer <token>`."
  schemas:
    ProblemDetails:
      type: object
      description: An RFC 9457 Problem Details object.
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code.
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of
            the problem.
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of
            the problem.
    ValidationProblem:
      description: RFC 9457 Problem Details extended with validation errors.
      allOf:
        - "$ref": "#/components/schemas/ProblemDetails"
        - type: object
          required:
            - errors
          properties:
            errors:
              type: array
              description: List of validation errors.
              items:
                "$ref": "#/components/schemas/ValidationProblemItem"
    ValidationProblemItem:
      type: object
      description: A single validation error with a JSON pointer to the problematic
        field.
      required:
        - detail
        - pointer
      properties:
        detail:
          type: string
          description: Human-readable description of the validation error.
        pointer:
          type: string
          description: A JSON Pointer (RFC 6901) to the field that caused the error.
          example: "/collection_data/collection_manifest/mods/0/source/mod_id"
    PaginationMeta:
      type: object
      description: Pagination metadata for paginated responses.
      required:
        - page
        - page_size
        - total_count
      properties:
        page:
          type: integer
          description: Current page number (1-indexed).
          example: 1
        page_size:
          type: integer
          description: Number of items per page.
          example: 20
        total_count:
          type: integer
          description: Total number of items matching the query across all pages.
          example: 4123
    EditCollectionRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the collection.
          minLength: 3
          maxLength: 36
        summary:
          type: string
          description: Collection summary.
          maxLength: 255
        description:
          type: string
          description: Description of the collection.
        category_id:
          type: integer
          nullable: true
          description: ID of the parent category.
    TrendingModsResponse:
      type: object
      required:
        - mods
      properties:
        mods:
          type: array
          items:
            "$ref": "#/components/schemas/TrendingMod"
    TrendingMod:
      type: object
      description: A trending mod entry in the public marketing feed.
      required:
        - name
        - mod_page_url
      properties:
        name:
          type: string
          description: The mod name.
        author:
          type: string
          nullable: true
          description: The display name of the user who uploaded the mod.
        summary:
          type: string
          nullable: true
          description: Short summary shown on the mod listing.
        picture_url:
          type: string
          nullable: true
          description: URL of the mod's main image.
        mod_page_url:
          type: string
          description: Canonical URL of the mod page on nexusmods.com.
    GetModDetails:
      allOf:
        - "$ref": "#/components/schemas/Mod"
    Mod:
      type: object
      required:
        - id
        - game_scoped_id
        - game_id
      properties:
        id:
          type: string
          description: The unique identifier for the mod.
        game_scoped_id:
          type: string
          description: The game-scoped identifier for the mod.
        game_id:
          type: string
          description: The unique identifier for game this mod belongs to.
        name:
          type: string
          nullable: true
          description: Mod name (only shown if mod is available).
    ModFile:
      type: object
      description: A mod file - the persistent, updatable file on a mod page. Its
        versions are mod file versions.
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: The unique identifier for the mod file.
          readOnly: true
        name:
          type: string
          description: The name of the mod file.
    ModFileWithAggregates:
      description: A mod file enriched with aggregate stats across its versions.
      allOf:
        - "$ref": "#/components/schemas/ModFile"
        - type: object
          required:
            - is_active
            - last_file_uploaded_at
            - versions_count
            - archived_count
            - removed_count
          properties:
            is_active:
              type: boolean
              description: True if the mod file has at least one version with an active
                category (main, update, optional, or miscellaneous).
            last_file_uploaded_at:
              type: string
              format: date-time
              nullable: true
              description: The most recent file upload date across all versions. Null
                if the mod file has no versions.
            versions_count:
              type: integer
              description: The total number of versions in the mod file.
            archived_count:
              type: integer
              description: The number of archived versions in the mod file.
            removed_count:
              type: integer
              description: The number of removed versions in the mod file.
    ModFileWithMod:
      description: A mod file with its associated mod.
      allOf:
        - "$ref": "#/components/schemas/ModFile"
        - type: object
          required:
            - mod
          properties:
            mod:
              "$ref": "#/components/schemas/MinimalMod"
    ModFileVersion:
      type: object
      description: A single version of a mod file, merging the physical file and its
        position within the mod file.
      required:
        - id
        - file
        - position
        - game_scoped_id
        - name
        - version
        - category
        - uploaded_at
      properties:
        id:
          type: string
          description: The unique identifier for the mod file version.
        file:
          "$ref": "#/components/schemas/ModFile"
        position:
          type: string
          format: decimal
          description: Position within the mod file.
        game_scoped_id:
          type: string
          description: The game-scoped identifier for the mod file version.
        name:
          type: string
          description: The name of the mod file version.
        version:
          type: string
          description: The version string of the mod file version.
        category:
          "$ref": "#/components/schemas/ModFileCategory"
        uploaded_at:
          type: string
          format: date-time
          description: The date and time the version was uploaded.
        is_primary:
          type: boolean
          description: Whether this version is the primary file for the mod. The primary
            file represents the default download file for a mod page. There can be
            at most one primary file per mod. Defaults to false if omitted.
    ModFilesResponse:
      type: object
      required:
        - mod_files
      properties:
        mod_files:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileWithAggregates"
    ModFileVersionsResponse:
      type: object
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersion"
    ModFileCategory:
      type: string
      enum:
        - main
        - update
        - optional
        - old_version
        - miscellaneous
        - removed
        - archived
        - unknown
    MinimalMod:
      type: object
      description: A minimal representation of a mod.
      required:
        - id
        - game_scoped_id
        - name
        - game
      properties:
        id:
          type: string
          description: The unique identifier for the mod.
        game_scoped_id:
          type: string
          description: The game-scoped identifier for the mod.
        name:
          type: string
          description: The name of the mod.
        game:
          "$ref": "#/components/schemas/MinimalGame"
        thumbnail_url:
          type: string
          nullable: true
          description: The URL of the mod's thumbnail image.
        status:
          "$ref": "#/components/schemas/ModStatus"
        adult_content:
          type: boolean
          nullable: true
          description: Whether the mod is marked as adult content.
    ModStatus:
      type: string
      description: The effective visibility status of a mod.
      enum:
        - published
        - not_published
        - hidden
        - under_moderation
        - removed
        - removed_by_staff
    MinimalGame:
      type: object
      description: A minimal representation of a game.
      required:
        - id
        - name
        - domain_name
      properties:
        id:
          type: string
          description: The unique identifier for the game.
        name:
          type: string
          description: The name of the game.
        domain_name:
          type: string
          description: The URL-friendly slug for the game.
          example: skyrimspecialedition
    ToggleLegacyModRequirementsRequest:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: Whether legacy mod-level requirements should be used for this
            mod.
    UpdateModFileRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the mod file.
          maxLength: 255
          pattern: "^[a-zA-Z0-9 _'().-]+$"
    MoveModFileVersionsRequest:
      type: object
      required:
        - version_ids
        - target
      properties:
        version_ids:
          type: array
          description: |
            The unique identifiers for the mod file versions to move.
            Versions are inserted in this order, and `version_ids` is expected to be ordered from earliest to latest version.
          items:
            type: string
          minItems: 1
        target:
          "$ref": "#/components/schemas/MoveToPosition"
    MoveModFileVersionsResponse:
      type: object
      description: The result of a bulk move operation.
      required:
        - versions
        - target_mod_file
      properties:
        versions:
          type: array
          description: The updated versions reflecting their new mod file and order.
          items:
            "$ref": "#/components/schemas/ModFileVersion"
        modified_source_mod_files:
          type: array
          description: "A list of source mod files that had versions removed but still
            contain other versions.

            "
          items:
            "$ref": "#/components/schemas/ModFileWithAggregates"
        deleted_source_mod_file_ids:
          type: array
          description: |
            A list of IDs for any source mod files that were automatically deleted because they became
            empty as a result of this move.
          items:
            type: string
        target_mod_file:
          "$ref": "#/components/schemas/ModFileWithAggregates"
    MoveModFileVersionsToNewModFileRequest:
      type: object
      required:
        - version_ids
        - mod_file_name
      properties:
        version_ids:
          type: array
          description: |
            The unique identifiers for the mod file versions to move.
            Versions are inserted in this order, and `version_ids` is expected to be ordered from earliest to latest version.
          items:
            type: string
          minItems: 1
        mod_file_name:
          type: string
          description: The name of the new mod file.
          maxLength: 255
          pattern: "^[a-zA-Z0-9 _'().-]+$"
    MoveModFileVersionsToNewModFileResponse:
      type: object
      description: The result of a bulk move operation.
      required:
        - versions
        - new_mod_file
      properties:
        versions:
          type: array
          description: The updated versions reflecting their new mod file and order.
          items:
            "$ref": "#/components/schemas/ModFileVersion"
        modified_source_mod_files:
          type: array
          description: "A list of source mod files that had versions removed but still
            contain other versions.

            "
          items:
            "$ref": "#/components/schemas/ModFileWithAggregates"
        deleted_source_mod_file_ids:
          type: array
          description: |
            A list of IDs for any source mod files that were automatically deleted because they became
            empty as a result of this move.
          items:
            type: string
        new_mod_file:
          "$ref": "#/components/schemas/ModFileWithAggregates"
    MoveToPosition:
      type: object
      description: Place the moved versions earlier (`before`) or later (`after`)
        with respect to the target version.
      required:
        - target_version_id
        - relative_placement
      properties:
        target_version_id:
          type: string
          description: The unique identifier of the version to position relative to.
        relative_placement:
          "$ref": "#/components/schemas/RelativePlacement"
    RelativePlacement:
      type: string
      description: "`before`: earlier than the target. `after`: later than the target."
      enum:
        - before
        - after
    UpdateModFileVersionDependencyRangesRequest:
      type: object
      required:
        - dependency_definitions
      properties:
        dependency_definitions:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersionDependencyRangeDefinitionInput"
    ModFileVersionDependencyRangeDefinitionInput:
      type: object
      required:
        - ranges
      properties:
        ranges:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersionDependencyRangeInput"
    ModFileVersionDependencyRangeInput:
      type: object
      required:
        - min_version_id
      properties:
        min_version_id:
          type: string
          description: The ID of the mod file version representing the lower bound
            of the range.
        max_version_id:
          type: string
          nullable: true
          description: The ID of the mod file version representing the upper bound
            of the range. Null means open-ended (no upper bound).
    ModFileVersionDependencyRangesResponse:
      type: object
      required:
        - dependency_definitions
      properties:
        dependency_definitions:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersionDependencyDefinitionWithRanges"
    ModFileVersionDependencyDefinitionWithRanges:
      type: object
      required:
        - id
        - ranges
      properties:
        id:
          type: string
          description: The unique identifier for the dependency definition.
        ranges:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersionDependencyRange"
    ModFileVersionDependencyRange:
      type: object
      required:
        - id
        - target_mod_file
        - min_version
        - max_version
      properties:
        id:
          type: string
          description: The unique identifier for the dependency range.
        target_mod_file:
          "$ref": "#/components/schemas/ModFileWithMod"
        min_version:
          "$ref": "#/components/schemas/ModFileVersion"
        max_version:
          nullable: true
          allOf:
            - "$ref": "#/components/schemas/ModFileVersion"
    ModFileVersionDependencyMaterializedResponse:
      type: object
      required:
        - dependencies
      properties:
        dependencies:
          type: array
          items:
            "$ref": "#/components/schemas/MaterializedModFileVersionDependency"
    MaterializedModFileVersionDependency:
      type: object
      description: A materialized dependency definition with its resolved candidate
        mod files and versions.
      required:
        - id
        - candidate_mod_files
      properties:
        id:
          type: string
          description: The unique identifier for the dependency definition.
        candidate_mod_files:
          type: array
          items:
            "$ref": "#/components/schemas/DependencyCandidateModFile"
    DependencyCandidateModFile:
      type: object
      description: A mod file with its associated mod and candidate versions.
      required:
        - id
        - name
        - mod
        - candidate_versions
      properties:
        id:
          type: string
          description: The unique identifier for the mod file.
        name:
          type: string
          description: The name of the mod file.
        mod:
          "$ref": "#/components/schemas/MinimalMod"
        candidate_versions:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersion"
    ModFileVersionDependencyCandidatesBatchRequest:
      type: object
      required:
        - version_ids
      properties:
        version_ids:
          type: array
          description: |
            The source mod file version ids to resolve dependency candidates for. These are the
            installed/enabled versions whose dependencies are being matched.
          items:
            type: string
          minItems: 1
          maxItems: 5000
        page:
          type: integer
          description: Page number (1-indexed).
          default: 1
          minimum: 1
        page_size:
          type: integer
          description: Number of candidate rows per page.
          default: 1000
          minimum: 1
          maximum: 5000
    ModFileVersionDependencyCandidatesBatchResponse:
      type: object
      required:
        - candidates
      properties:
        candidates:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersionDependencyCandidate"
    ModFileVersionDependencyCandidate:
      type: object
      description: |
        A single materialized dependency candidate row. Rows sharing the same
        (`source_version_id`, `definition_id`) are OR-alternatives for one dependency of the
        source version. Rows sharing the same `mod_file_id` belong to the same update group/chain.
      required:
        - source_version_id
        - definition_id
        - mod_file_id
        - version_id
        - position
        - category
        - mod_status
        - mod_id
      properties:
        source_version_id:
          type: string
          description: The requesting (installed/enabled) mod file version id.
        definition_id:
          type: string
          description: The dependency definition id. Rows sharing this id are OR-alternatives.
        mod_file_id:
          type: string
          description: The mod file (update group/chain) the candidate belongs to.
        version_id:
          type: string
          description: The candidate mod file version id.
        position:
          type: string
          format: decimal
          description: Position within the mod file. Higher = newer within the chain.
        category:
          "$ref": "#/components/schemas/ModFileCategory"
        mod_status:
          "$ref": "#/components/schemas/ModStatus"
        mod_id:
          type: string
          description: The id of the mod the candidate belongs to.
    ModFileVersionsBatchRequest:
      type: object
      required:
        - version_ids
      properties:
        version_ids:
          type: array
          description: The mod file version ids to resolve details for.
          items:
            type: string
          minItems: 1
          maxItems: 2000
    ModFileVersionsBatchResponse:
      type: object
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            "$ref": "#/components/schemas/ModFileVersionDetail"
    ModFileVersionDetail:
      type: object
      description: |
        Lightweight mod file version detail used to resolve an installed file's mod file
        (update group) and to hydrate recommended candidates.
      required:
        - id
        - mod_id
        - mod_file_id
        - name
        - version
        - position
      properties:
        id:
          type: string
          description: The mod file version id.
        mod_id:
          type: string
          description: The id of the mod this version belongs to.
        mod_file_id:
          type: string
          description: The id of the mod file (update group/chain) this version belongs
            to.
        name:
          type: string
          description: The name of the mod file version.
        version:
          type: string
          description: The version string of the mod file version.
        position:
          type: string
          format: decimal
          description: Position within the mod file. Higher = newer within the chain.
    ModsBatchRequest:
      type: object
      required:
        - mod_ids
      properties:
        mod_ids:
          type: array
          description: |
            Composite mod UIDs (gameId << 32 | modId) to resolve. Same id space as the `mod_id`
            returned by the dependency candidates and mod file version batch endpoints.
          items:
            type: string
          minItems: 1
          maxItems: 2000
    ModsBatchResponse:
      type: object
      required:
        - mods
      properties:
        mods:
          type: array
          items:
            "$ref": "#/components/schemas/ModDetail"
    ModDetail:
      type: object
      description: |
        Mod-level display details. The game-scoped mod id and game id can be derived from `id` by
        bit-decomposition (modId = id & 0xFFFFFFFF, gameId = id >> 32); `game_id` is also returned
        directly for convenience.
      required:
        - id
        - game_id
        - name
        - summary
        - status
        - adult_content
      properties:
        id:
          type: string
          description: Composite mod UID. Echoes the request value so the caller can
            key results back.
        game_id:
          type: string
          description: The id of the game this mod belongs to.
        name:
          type: string
          description: Mod display name.
        summary:
          type: string
          description: |
            Sanitised short summary (plain text, as shown on mod cards). Empty string when the mod
            has none.
        status:
          "$ref": "#/components/schemas/ModStatus"
        thumbnail_url:
          type: string
          nullable: true
          description: |
            Mod thumbnail image URL. Null when the mod has no image, or when suppressed because the
            mod is under moderation or removed by staff.
        adult_content:
          type: boolean
          description: Whether the mod is flagged as adult content.
    CreateModFileRequest:
      type: object
      required:
        - upload_id
        - mod_id
        - name
        - version
        - file_category
      properties:
        upload_id:
          type: string
          format: uuid
          description: The unique identifier for the upload.
        mod_id:
          type: string
          description: |
            The unique identifier for the mod this file belongs to.

            * Use [get mod](#tag/mods/operation/getMod) to get the game scoped ID for a mod using the data from a site URL e.g.
              `/skyrimspecialedition/mods/12604`.
        name:
          type: string
          description: Mod file name.
          maxLength: 50
          pattern: "^[a-zA-Z0-9 _'().-]+$"
        version:
          type: string
          description: Mod file version.
          maxLength: 50
          pattern: "^[a-zA-Z0-9.-]+$"
        description:
          type: string
          description: Description of the mod file.
          nullable: true
        file_category:
          "$ref": "#/components/schemas/NewModFileCategory"
        primary_mod_manager_download:
          type: boolean
          description: Whether this file is the default download for mod managers.
          default: false
        allow_mod_manager_download:
          type: boolean
          description: Whether mod manager downloads are enabled for this file.
          default: true
        show_requirements_pop_up:
          type: boolean
          description: Whether to show a requirements popup when downloading this
            file.
          default: false
        update_mod_version:
          type: boolean
          description: Whether to update the mod's version to match this file's version.
          default: false
    CreateUploadRequest:
      type: object
      required:
        - size_bytes
        - filename
      properties:
        size_bytes:
          type: integer
          format: int64
          nullable: false
          description: Size of file in bytes.
        filename:
          type: string
          nullable: false
          description: User-defined filename.
    CreateUploadSuccess:
      type: object
      allOf:
        - "$ref": "#/components/schemas/Upload"
      required:
        - presigned_url
      properties:
        presigned_url:
          type: string
          description: Presigned URL.
    CreateMultipartUploadSuccess:
      type: object
      allOf:
        - "$ref": "#/components/schemas/Upload"
      required:
        - part_size_bytes
        - part_presigned_urls
        - complete_presigned_url
      properties:
        part_size_bytes:
          type: integer
          format: int64
          description: Size of each part in bytes.
        part_presigned_urls:
          type: array
          items:
            type: string
          description: Presigned URLs for each upload part.
        complete_presigned_url:
          type: string
          description: Presigned URL to complete upload.
    FinaliseUploadSuccess:
      allOf:
        - "$ref": "#/components/schemas/Upload"
    GetUploadSuccess:
      allOf:
        - "$ref": "#/components/schemas/Upload"
    CreateModFileSuccess:
      allOf:
        - "$ref": "#/components/schemas/UploadModFile"
    Upload:
      type: object
      required:
        - id
        - user
        - state
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for the upload.
        user:
          "$ref": "#/components/schemas/UploadUser"
        state:
          "$ref": "#/components/schemas/UploadState"
    UploadUser:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: The unique identifier for the user who owns this upload.
    UploadModFile:
      type: object
      required:
        - id
        - game_scoped_id
        - name
        - file_category
      properties:
        id:
          type: string
          description: The unique identifier for the mod file.
        game_scoped_id:
          type: string
          description: The game-scoped identifier for the mod file.
        name:
          type: string
          description: Mod file name.
        file_category:
          "$ref": "#/components/schemas/NewModFileCategory"
    UploadState:
      type: string
