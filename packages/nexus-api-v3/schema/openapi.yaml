  "/mod-file-versions/{id}/dependencies/ranges":
    get:
      tags:
        - mods
      summary: Get mod file version dependency ranges
      description: |
        Retrieve dependency ranges for a given mod file version. Each dependency definition
        contains a set of version ranges within mod files that satisfy the dependency.
      operationId: getModFileVersionDependencyRanges
      x-badges:
        - name: Experimental
          color: orange
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier for the mod file version.
          schema:
            type: string
      responses:
        "200":
          description: The mod file version's dependency ranges.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ModFileVersionDependencyRangesResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: The mod file version was not found.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
    put:
      tags:
        - mods
      summary: Update mod file version dependency ranges
      description: |
        Replace all dependency range definitions for a given mod file version. Each
        dependency definition contains an array of version ranges. Ranges
        within the same definition represent alternatives (OR). Separate
        definitions are independent requirements (AND).

        A range is defined by a min_version_id (required) and an optional
        max_version_id. Both must refer to versions within the same mod file.
        When max_version_id is null the range is open-ended (no upper bound).
      operationId: setModFileVersionDependencyRanges
      x-badges:
        - name: Experimental
          color: orange
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier for the mod file version (i.e. the version
            to create dependency ranges for).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateModFileVersionDependencyRangesRequest"
      responses:
        "204":
          description: Successfully updated the mod file version dependency ranges.
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: The mod file version was not found.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: The request body failed validation.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/mod-file-versions/{id}/dependencies/materialized":
    get:
      tags:
        - mods
      summary: Get mod file version materialized dependencies
      description: |
        Retrieve materialized dependencies for a given mod file version. Resolves the
        stored dependency ranges into concrete candidate versions grouped by mod file.
      operationId: getModFileVersionDependencyMaterialized
      x-badges:
        - name: Experimental
          color: orange
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier for the mod file version.
          schema:
            type: string
      responses:
        "200":
          description: The mod file version's materialized dependencies.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ModFileVersionDependencyMaterializedResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: The mod file version was not found.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/mod-file-versions/dependencies/ranges/materialized/batch":
    post:
      tags:
        - mods
      summary: Batch get mod file version materialized dependency candidates
      description: |
        Resolves the materialized dependency candidates for a set of source mod file versions —
        the versions a client could install or recommend to satisfy each source version's
        dependencies.

        Each row is one candidate version for one source version's dependency definition. Rows
        sharing a `definition_id` are OR-alternatives (any one satisfies that dependency); rows
        sharing a `mod_file_id` are versions of the same mod file (update group/chain). Only
        candidates on published, non-moderated mods are included.

        Results are paged with a stable order, so the full candidate set can be fetched across
        pages. Source version ids with no resolvable candidates contribute no rows.

        `meta.total_count` is only meaningful on a non-empty page; a page past the end returns no
        candidates and `total_count` 0.
      operationId: getModFileVersionDependencyRangesMaterializedBatch
      x-badges:
        - name: Experimental
          color: orange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ModFileVersionDependencyCandidatesBatchRequest"
      responses:
        "200":
          description: A page of materialized dependency candidate rows.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    "$ref": "#/components/schemas/ModFileVersionDependencyCandidatesBatchResponse"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: The request body failed validation.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/mod-file-versions/batch":
    post:
      tags:
        - mods
      summary: Batch get mod file version details
      description: |
        Resolves a set of mod file versions to their mod file (update group/chain) along with the
        identifying details — name, version, and position within the chain.

        Only versions on visible mods are returned (non-moderated mods, excluding not-published,
        publish-with-game and wastebinned), matching the dependency candidates endpoint. Unknown
        version ids and versions on non-visible mods contribute no rows.
      operationId: getModFileVersionsBatch
      x-badges:
        - name: Experimental
          color: orange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ModFileVersionsBatchRequest"
      responses:
        "200":
          description: The resolved mod file version detail rows.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    "$ref": "#/components/schemas/ModFileVersionsBatchResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: The request body failed validation.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/mods/batch":
    post:
      tags:
        - mods
      summary: Batch get mod display details
      description: |
        Resolves a set of composite mod unique ids to their mod-level display details — name,
        summary, status, thumbnail and adult flag. The ids are the same id space as the `mod_id`
        returned by the dependency candidates and mod file version batch endpoints.

        Unknown ids contribute no rows. Mods that exist but are moderated / hidden / removed are
        returned with their `status`, so a now-unavailable mod can be told apart from one that
        never existed. Result order is not guaranteed.
      operationId: getModsBatch
      x-badges:
        - name: Experimental
          color: orange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ModsBatchRequest"
      responses:
        "200":
          description: The resolved mod detail rows.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    "$ref": "#/components/schemas/ModsBatchResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: The request body failed validation.
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
