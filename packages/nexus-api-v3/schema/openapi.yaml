    CreateCollectionRequest:
      type: object
      required:
        - upload_id
        - collection_data
      properties:
        upload_id:
          type: string
          format: uuid
          nullable: false
          description: The unique identifier for the upload to claim against this
            new collection.
        collection_data:
          "$ref": "#/components/schemas/CollectionPayload"
    CreateCollectionSuccess:
      type: object
      required:
        - id
        - slug
        - revision_id
        - revision_number
        - revision_status
      properties:
        id:
          type: string
          description: The unique identifier for the collection.
        slug:
          type: string
          description: The slug for the collection.
        revision_id:
          type: string
          description: The unique identifier for the initial collection revision.
        revision_number:
          type: integer
          description: The revision number.
        revision_status:
          "$ref": "#/components/schemas/RevisionStatus"
    CreateCollectionRevisionRequest:
      type: object
      required:
        - upload_id
        - collection_data
      properties:
        upload_id:
          type: string
          format: uuid
          nullable: false
          description: The unique identifier for the upload to claim against this
            new collection.
        collection_data:
          "$ref": "#/components/schemas/CollectionPayload"
    CreateCollectionRevisionSuccess:
      type: object
      required:
        - id
        - collection_id
        - revision_number
        - revision_status
      properties:
        id:
          type: string
          description: The unique identifier for the revision.
        collection_id:
          type: string
          description: The unique identifier for the collection this revision belongs
            to.
        revision_number:
          type: integer
          description: The revision number.
        revision_status:
          "$ref": "#/components/schemas/RevisionStatus"
    CollectionPayload:
      type: object
      description: The data payload used to create a collection revision.
      required:
        - adult_content
        - collection_manifest
        - collection_schema_id
      properties:
        adult_content:
          type: boolean
          description: Whether the collection includes adult content.
        collection_manifest:
          "$ref": "#/components/schemas/CollectionManifest"
        collection_schema_id:
          type: integer
          description: Collection schema id.
    CollectionManifest:
      type: object
      description: The JSON manifest that defines a collection.
      required:
        - info
        - mods
      properties:
        info:
          "$ref": "#/components/schemas/CollectionManifestInfo"
        mods:
          type: array
          items:
            "$ref": "#/components/schemas/CollectionManifestMod"
          description: List of mod resources for the manifest.
    CollectionManifestInfo:
      type: object
      description: The info section of the JSON manifest.
      required:
        - author
        - name
        - domain_name
      properties:
        author:
          type: string
          description: The collection author's name.
        author_url:
          type: string
          nullable: true
          description: The url of the author's profile.
        name:
          type: string
          description: The name of the collection.
        description:
          type: string
          nullable: true
          description: A description of the collection.
        summary:
          type: string
          nullable: true
          description: A short summary of the collection.
        domain_name:
          type: string
          description: The domain name of the game.
        game_versions:
          type: array
          nullable: true
          items:
            type: string
          description: A list of game versions that this revision has been tested
            with.
    CollectionManifestMod:
      type: object
      description: Defines a mod to be used in a collection as part of the manifest.
      required:
        - name
        - version
        - optional
        - domain_name
        - source
      properties:
        name:
          type: string
          description: The name of the mod.
        version:
          type: string
          description: The mod version.
        optional:
          type: boolean
          description: Whether the mod is required for this collection.
        domain_name:
          type: string
          description: The domain name of the game for the mod.
        source:
          "$ref": "#/components/schemas/CollectionManifestModSource"
        author:
          type: string
          nullable: true
          description: The name of the mod author.
    CollectionManifestModSource:
      type: object
      description: Source information for a mod (nexus or other) as part of the manifest.
      required:
        - type
      properties:
        type:
          "$ref": "#/components/schemas/ModSource"
        mod_id:
          type: string
          description: The identifier of the mod source for this collection manifest.
        file_id:
          type: string
          description: The identifier of the file associated with the mod in this
            collection manifest.
        md5:
          type: string
          nullable: true
          description: An MD5 hash of the file for verification.
        file_size:
          type: integer
          nullable: true
          description: The file size in kb.
        update_policy:
          "$ref": "#/components/schemas/UpdatePolicy"
        logical_filename:
          type: string
          nullable: true
          description: Logical file name of the mod resource.
        file_expression:
          type: string
          nullable: true
          description: File expression of the mod resource.
        url:
          type: string
          nullable: true
          description: The direct url of the file.
        adult_content:
          type: boolean
          nullable: true
          description: Does the mod include adult content.
    ModSource:
      type: string
      description: Used to define the source of a mod. Useful for informing Collections
        how to retrieve mods.
      enum:
        - nexus
        - direct
        - browse
        - manual
        - bundle
    RevisionStatus:
      type: string
      description: The status of a collection revision.
      enum:
        - draft
        - published
        - retracted
    UpdatePolicy:
      type: string
      description: Available update policies of a file resource
      enum:
        - exact
        - latest
        - prefer
