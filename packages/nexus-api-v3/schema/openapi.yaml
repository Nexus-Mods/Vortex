      description: |
        Creates a new upload session. This allows you to upload data for a new mod file.

        ⚠️ Files larger than 100 MiB must use a [multi part upload](#tag/uploads/operation/createMultipartUpload).

        ### Next steps
        * Call `PUT` with your file data to the returned `presigned_url`. Recommended for files up to 100 MiB.
        * Once all data is uploaded, [finalise the upload](#tag/uploads/operation/finaliseUpload).
      operationId: createUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateUploadRequest"
      responses:
        "201":
          description: Upload ID and presigned URL
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    "$ref": "#/components/schemas/CreateUploadSuccess"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
