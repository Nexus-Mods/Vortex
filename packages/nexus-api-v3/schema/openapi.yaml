    CreateModFileVersionRequest:
      type: object
      required:
        - upload_id
        - name
        - version
        - file_category
      properties:
        upload_id:
          type: string
          format: uuid
          description: The unique identifier for the upload.
        name:
          type: string
          description: Mod file name
          maxLength: 50
          pattern: "^[a-zA-Z0-9 _'().-]+$"
        description:
          type: string
          description: Description of the mod file
          nullable: true
        version:
          type: string
          description: Mod file version
          maxLength: 50
          pattern: "^[a-zA-Z0-9.-]+$"
        file_category:
          "$ref": "#/components/schemas/NewModFileCategory"
        primary_mod_manager_download:
          type: boolean
          description: Whether this file is the default download for mod managers.
        allow_mod_manager_download:
          type: boolean
          description: Whether mod manager downloads are enabled for this file.
        show_requirements_pop_up:
          type: boolean
          description: Whether to show a requirements popup when downloading this
            file.
        update_mod_version:
          type: boolean
          description: Whether to update the mod's version to match this file's version.
          default: false
        archive_existing_file:
          type: boolean
          description: Whether to archive the existing file when uploading a new version.
          default: false
        previous_version_id:
          type: string
          nullable: true
          description: The unique identifier for the mod file version this version
