name: Sync Tag to vortex-api

on:
  push:
    tags:
      - "v*"

jobs:
  sync-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Nexus-Mods
          repositories: vortex-api

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout vortex-api
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Nexus-Mods/vortex-api.git .

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          # Strip a leading 'v' if present (e.g. v1.2.3 -> 1.2.3)
          VERSION=${TAG#v}
          npm version "$VERSION" --no-git-tag-version

      - name: Commit and push version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.tag.outputs.tag }}"
          git push origin HEAD

      - name: Create and push tag on vortex-api
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}
