name: Update API Repo

on:
  push:
    branches:
      - master

jobs:
  update-api-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Print dotnet info
        run: dotnet --info

      - name: Read Node.js version from package.json
        id: node-version
        shell: pwsh
        run: |
          $packageJson = Get-Content package.json | ConvertFrom-Json
          $nodeVersion = $packageJson.engines.node
          echo "NODE_VERSION=$nodeVersion" >> $env:GITHUB_OUTPUT
          echo "Using Node.js version: $nodeVersion"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.NODE_VERSION }}
          cache: "pnpm"

      - name: Build FOMOD
        run: pnpm run build:fomod

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Build API
        run: pnpm run api

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Nexus-Mods
          repositories: vortex-api

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Run update script
        env:
          MAIN_REPO: Nexus-Mods/Vortex
          API_REPO: https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Nexus-Mods/vortex-api.git
          PUSH_BRANCH: master
        run: node packages/vortex-api/update-repo.mjs
