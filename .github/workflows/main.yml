name: Main

on:
  push:
    branches: [master, release/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Fetch PR base
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=1

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install volta, Node.js and Yarn
        uses: volta-cli/action@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          cache_dependency_path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      # NOTE(erri120): fontconfig required by font-scanner required by theme-switcher
      - name: Install fontconfig
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install dependencies
        run: pnpm install
        env:
          VORTEX_SKIP_ELECTRON_REBUILD: "1"

      - name: Cache DuckDB extensions
        uses: actions/cache@v4
        with:
          path: src/main/build/duckdb-extensions
          key: duckdb-${{ runner.os }}-${{ hashFiles('scripts/duckdb-extensions.json', 'scripts/download-duckdb-extensions.ts', 'pnpm-lock.yaml') }}

      - name: Build, lint, and typecheck affected projects
        if: github.event_name == 'pull_request'
        run: pnpm exec nx affected -t build lint typecheck --base=origin/${{ github.base_ref }} --head=HEAD

      - name: Build, lint, and typecheck all projects
        if: github.event_name != 'pull_request'
        run: pnpm exec nx run-many -t build lint typecheck

      - name: Assets
        run: pnpm run assets

      - name: Test
        run: pnpm run test

      - name: Upload API artifacts
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: api-artifacts
          retention-days: 1
          path: |
            etc/vortex.api.md
            packages/vortex-api/lib

  api:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Download API artifacts
        uses: actions/download-artifact@v8
        with:
          name: api-artifacts

      - name: Install volta, Node.js
        uses: volta-cli/action@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Nexus-Mods
          repositories: vortex-api

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Run update script
        env:
          MAIN_REPO: Nexus-Mods/Vortex
          API_REPO: https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Nexus-Mods/vortex-api.git
          PUSH_BRANCH: master
        run: node packages/vortex-api/update-repo.mjs
