name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/e2e.yml
      - "packages/e2e/**"
  schedule:
    # At 14:15 on every day-of-week from Monday through Thursday.
    - cron: "15 14 * * 1-4"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-name: vortex-e2e
          - os-name: platform-cluster

    runs-on: ${{ matrix.os-name }}

    continue-on-error: true
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: "recursive"

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install volta, Node.js and Yarn
        uses: volta-cli/action@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      # NOTE(erri120): fontconfig required by font-scanner required by theme-switcher
      - name: Install fontconfig
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libfontconfig1-dev p7zip-full libgtk-3-0 libatk-bridge2.0-0 libatspi2.0-0 libasound2t64 libcups2 libgbm1 libnss3 libxkbcommon0 libnspr4

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: pnpm -F @vortex/e2e exec playwright install chromium

      - name: Install Playwright Operating System Dependencies
        if: runner.os == 'Linux'
        run: pnpm -F @vortex/e2e exec playwright install-deps chromium

      # NOTE(erri120): https://www.electronjs.org/blog/electron-42-0#electron-no-longer-downloads-itself-via-postinstall-script
      - name: Pre-warm electron
        run: pnpm -F @vortex/e2e exec install-electron

      # Fix chrome-sandbox permissions for Electron on Linux
      # The SUID sandbox requires the binary to be owned by root with mode 4755
      - name: Fix Chrome sandbox permissions
        if: runner.os == 'Linux'
        run: |
          SANDBOX_PATH=$(find node_modules -name chrome-sandbox -type f 2>/dev/null | head -1)
          if [ -n "$SANDBOX_PATH" ]; then
            sudo chown root:root "$SANDBOX_PATH"
            sudo chmod 4755 "$SANDBOX_PATH"
          fi

      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        env:
          E2E_NEXUS_FREE_USER_USERNAME: ${{ secrets.E2E_NEXUS_FREE_USER_USERNAME }}
          E2E_NEXUS_FREE_USER_PASSWORD: ${{ secrets.E2E_NEXUS_FREE_USER_PASSWORD }}
          E2E_NEXUS_PREMIUM_USER_USERNAME: ${{ secrets.E2E_NEXUS_PREMIUM_USER_USERNAME }}
          E2E_NEXUS_PREMIUM_USER_PASSWORD: ${{ secrets.E2E_NEXUS_PREMIUM_USER_PASSWORD }}
        run: pnpm e2e

      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        continue-on-error: true
        env:
          E2E_NEXUS_FREE_USER_USERNAME: ${{ secrets.E2E_NEXUS_FREE_USER_USERNAME }}
          E2E_NEXUS_FREE_USER_PASSWORD: ${{ secrets.E2E_NEXUS_FREE_USER_PASSWORD }}
          E2E_NEXUS_PREMIUM_USER_USERNAME: ${{ secrets.E2E_NEXUS_PREMIUM_USER_USERNAME }}
          E2E_NEXUS_PREMIUM_USER_PASSWORD: ${{ secrets.E2E_NEXUS_PREMIUM_USER_PASSWORD }}
        run: xvfb-run pnpm e2e

      # The test steps run with continue-on-error so flaky tests never block
      # PRs, but that also masks hard failures (e.g. the app build aborting
      # before Playwright starts). A missing report directory is the signature
      # of such a failure - surface it explicitly instead of letting the
      # encrypt step below trip over the missing directory.
      - name: Verify the test run produced a report
        shell: bash
        run: |
          if [ ! -d ./packages/e2e/playwright-report ]; then
            echo "::error::No Playwright report was produced - the build or test runner failed before executing any tests. Check the 'Run E2E tests' step log for the real error."
            exit 1
          fi

      - name: Encrypt test report
        if: always() && hashFiles('packages/e2e/playwright-report/**') != ''
        shell: bash
        env:
          E2E_ARTIFACT_PASSWORD: ${{ secrets.E2E_ARTIFACT_PASSWORD }}
        run: 7z a -p"$E2E_ARTIFACT_PASSWORD" -mhe=on playwright-report.7z ./packages/e2e/playwright-report/

      - name: Upload test report
        if: always() && hashFiles('packages/e2e/playwright-report/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report-${{ matrix.os-name }}
          retention-days: 14
          path: playwright-report.7z
          if-no-files-found: error

      - name: Encrypt test results
        if: failure() && hashFiles('packages/e2e/test-results/**') != ''
        shell: bash
        env:
          E2E_ARTIFACT_PASSWORD: ${{ secrets.E2E_ARTIFACT_PASSWORD }}
        run: 7z a -p"$E2E_ARTIFACT_PASSWORD" -mhe=on test-results.7z ./packages/e2e/test-results/

      - name: Upload test results
        if: failure() && hashFiles('packages/e2e/test-results/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ matrix.os-name }}
          retention-days: 7
          path: test-results.7z
          if-no-files-found: error
