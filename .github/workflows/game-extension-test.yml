name: Game Extension Test

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: game-extension-test
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run game-extension-test
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: pnpm --filter @vortex/game-extension-test run start -- --all
        id: run

      - name: Report failure via rolling issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = "[game-extension-test] nightly run failed";
            const body = `Nightly run failed on ${new Date().toISOString()}.\n\nWorkflow: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "game-extension-test",
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body, labels: ["game-extension-test"],
              });
            }

      - name: Close rolling issue on success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const title = "[game-extension-test] nightly run failed";
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "game-extension-test",
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.number, state: "closed",
              });
            }
